<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>C. elegans oscillator — GSE130811 expression dashboard</title>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>
<style>
  :root { --bg:#0f1117; --panel:#171a23; --fg:#e6e9ef; --muted:#9aa3b2; --accent:#5aa9e6; --line:#262b38; }
  * { box-sizing: border-box; }
  html, body { height:100%; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
         background:var(--bg); color:var(--fg); display:flex; flex-direction:column; }
  header { padding:14px 20px; border-bottom:1px solid var(--line); flex:0 0 auto; }
  header h1 { margin:0; font-size:16px; font-weight:600; }
  header p { margin:4px 0 0; font-size:12px; color:var(--muted); }
  .wrap { display:flex; gap:18px; padding:18px 20px; align-items:stretch;
          flex:1 1 auto; min-height:0; }
  .controls { width:340px; flex:0 0 340px; overflow-y:auto; }
  .dataset { margin-bottom:14px; }
  .dataset select { width:100%; margin-top:6px; padding:9px 10px; font-size:13px; border-radius:8px;
        border:1px solid var(--line); background:var(--panel); color:var(--fg); outline:none; cursor:pointer; }
  .dataset select:focus { border-color:var(--accent); }
  .dshint { margin-top:6px; font-size:11px; color:var(--muted); line-height:1.5; }
  .search { position:relative; }
  input[type=text]{ width:100%; padding:10px 12px; font-size:14px; border-radius:8px;
        border:1px solid var(--line); background:var(--panel); color:var(--fg); outline:none; }
  input[type=text]:focus{ border-color:var(--accent); }
  #suggest { position:absolute; left:0; right:0; top:42px; z-index:10; background:var(--panel);
        border:1px solid var(--line); border-radius:8px; max-height:320px; overflow:auto; display:none; }
  #suggest div { padding:8px 12px; cursor:pointer; font-size:13px; border-bottom:1px solid var(--line); }
  #suggest div:last-child{ border-bottom:none; }
  #suggest div:hover, #suggest div.active { background:#1f2533; }
  #suggest .sym { font-weight:600; }
  #suggest .wb { color:var(--muted); font-size:11px; margin-left:6px; }
  #suggest .bt { color:var(--muted); font-size:11px; float:right; }
  #suggest .pick { pointer-events:none; vertical-align:middle; margin-right:8px; accent-color:var(--accent); }
  #suggest div.added { opacity:.55; cursor:default; }
  #suggest div.added:hover { background:none; }
  #suggest .addedtag { color:var(--muted); font-size:10px; margin-left:6px; }
  #suggest .sugfoot { position:sticky; bottom:0; display:flex; align-items:center; gap:10px;
        padding:8px 12px; background:var(--panel); border-top:1px solid var(--line); cursor:default; }
  #suggest .sugfoot:hover { background:var(--panel); }
  #suggest .sugfoot button.add { background:var(--accent); border:none; color:var(--bg); border-radius:6px;
        padding:7px 12px; font-size:12px; font-weight:600; cursor:pointer; }
  #suggest .sugfoot button.clearp { background:none; border:1px solid var(--line); color:var(--muted);
        border-radius:6px; padding:7px 10px; font-size:12px; cursor:pointer; }
  #suggest .sugfoot button.clearp:hover { color:var(--fg); border-color:var(--accent); }
  #suggest .sughdr { position:sticky; top:0; padding:7px 12px; font-size:11px; color:var(--muted);
        background:#141822; border-bottom:1px solid var(--line); cursor:default; }
  #suggest .sughdr:hover { background:#141822; }
  #suggest .simr { color:var(--accent); font-size:11px; float:right; font-variant-numeric:tabular-nums; }
  #suggest .simtoggle { cursor:pointer; margin-left:5px; padding:1px 7px; border-radius:4px;
        border:1px solid var(--line); color:var(--muted); font-size:10px; }
  #suggest .simtoggle.on { color:var(--bg); background:var(--accent); border-color:var(--accent); font-weight:600; }
  .chip .sim-btn { cursor:pointer; margin-left:8px; color:var(--accent); font-size:11px; line-height:1;
        border:1px solid var(--line); border-radius:5px; padding:2px 6px; white-space:nowrap; }
  .chip .sim-btn:hover { border-color:var(--accent); background:rgba(90,169,230,.14); }
  .osc { color:#7bc86c; font-size:10px; font-weight:600; margin-left:6px;
         border:1px solid #2f5d34; border-radius:8px; padding:0 5px; }
  .tf  { color:#c9a0ff; font-size:10px; font-weight:600; margin-left:6px;
         border:1px solid #4a3a66; border-radius:8px; padding:0 5px; }
  .oscfilter { display:flex; align-items:center; gap:6px; margin-top:9px;
        font-size:13px; cursor:pointer; }
  .oscfilter span { color:var(--muted); font-size:12px; }
  .chips { margin-top:12px; display:flex; flex-wrap:wrap; gap:8px; }
  .chip { display:flex; align-items:center; gap:7px; padding:5px 9px; font-size:13px;
        background:var(--panel); border:1px solid var(--line); border-radius:16px; }
  .chip .dot { width:10px; height:10px; border-radius:50%; flex:0 0 10px; }
  .chip .x { cursor:pointer; color:var(--muted); font-weight:700; margin-left:2px; }
  .chip .x:hover { color:#e06c75; }
  .chip small { color:var(--muted); }
  .rowbtns { margin-top:10px; display:flex; gap:10px; align-items:center; font-size:12px; color:var(--muted); }
  .rowbtns button { background:none; border:1px solid var(--line); color:var(--muted); border-radius:6px;
        padding:4px 8px; cursor:pointer; font-size:12px; }
  .rowbtns button:hover { color:var(--fg); border-color:var(--accent); }
  .scale { margin-top:16px; font-size:13px; }
  .scale label { margin-right:14px; cursor:pointer; }
  .meta { margin-top:18px; font-size:12px; color:var(--muted); line-height:1.7; }
  .meta b { color:var(--fg); }
  #plot { flex:1 1 600px; min-width:480px; min-height:0; background:var(--panel);
        border:1px solid var(--line); border-radius:10px; }
  .hint { color:var(--muted); font-size:12px; margin-top:10px; }
  a { color:var(--accent); }
</style>
</head>
<body>
<header>
  <h1>State transitions of a developmental oscillator — extended wild-type time course</h1>
  <p id="subtitle"></p>
</header>

<div class="wrap">
  <div class="controls">
    <div class="dataset">
      <b style="font-size:12px;color:var(--muted)">DATASET</b><br>
      <select id="dataset"></select>
      <div class="dshint" id="dshint"></div>
    </div>

    <div class="search">
      <input id="q" type="text" autocomplete="off" spellcheck="false"
             placeholder="Add a gene (e.g. col-19, lin-42, WBGene00000608)…">
      <div id="suggest"></div>
    </div>

    <label class="oscfilter"><input type="checkbox" id="osconly">
      oscillators only <span id="osccount"></span></label>
    <label class="oscfilter"><input type="checkbox" id="tfonly">
      transcription factors only <span id="tfcount"></span></label>

    <div class="chips" id="chips"></div>
    <div class="rowbtns">
      <button id="clear">Clear all</button>
      <label><input type="checkbox" id="showrep" checked> show replicate points</label>
    </div>

    <div class="scale">
      <b style="font-size:12px;color:var(--muted)">Y-AXIS</b><br>
      <label><input type="radio" name="scale" value="linear" checked> Linear</label>
      <label><input type="radio" name="scale" value="log"> Log&#8321;&#8320;</label>
    </div>

    <div class="meta" id="meta"></div>
    <div class="hint">Tick several suggestions and hit <b>Add selected</b> to plot them together
       (or just press Enter to add one). Linear shows absolute amplitude;
       log reveals fold-change rhythm in low-expressed genes.</div>
  </div>

  <div id="plot"></div>
</div>

<script src="data.js"></script>
<script>
const D = window.DATA;
const idx = D.index;
const palette = ["#5aa9e6","#e6915a","#7bc86c","#c678dd","#e6c84f","#56b6c2",
                 "#e06c75","#d19a66","#98c379","#61afef","#c9a0ff","#ef9a9a"];

let activeDS = D.default_dataset;
function ds(){ return D.datasets[activeDS]; }
// per-gene time course for the active dataset (undefined if the gene isn't in it)
function sv(wb){ return ds().series[wb]; }

document.getElementById("subtitle").textContent =
  `${D.meta.series} · ${D.meta.normalization} · ${D.meta.assembly} · ${D.meta.n_genes.toLocaleString()} genes`;
function renderMeta(){
  const m = ds().meta;
  const reps = ds().rep_hours ? ds().rep_hours.length : 0;
  document.getElementById("meta").innerHTML =
    `<b>Dataset:</b> ${m.label}<br>` +
    `<b>Assay:</b> ${m.assay} · ${m.series}<br>` +
    `<b>Normalization:</b> ${m.norm || D.meta.normalization}<br>` +
    `<b>Annotation:</b> ${D.meta.assembly}<br>` +
    `<b>Timepoints:</b> ` +
      (m.tp_label || `${ds().hours[0]}–${ds().hours[ds().hours.length-1]} h` +
        (reps ? ` (hourly), +${reps} replicates` : "")) + `<br>` +
    `<b>Oscillators:</b> ${D.meta.n_osc.toLocaleString()} genes — Meeuse et al. 2020 (cosine fit; with amplitude + peak phase)<br>` +
    `<span style="color:var(--muted)">cross-check: ${D.meta.n_oscC.toLocaleString()} by our computed method (see README)</span><br>` +
    `<b>Transcription factors:</b> ${D.meta.n_tf.toLocaleString()} genes (GO:0003700, DNA-binding TF activity)`;
}
document.getElementById("osccount").textContent = `(${D.meta.n_osc.toLocaleString()})`;
document.getElementById("tfcount").textContent = `(${D.meta.n_tf.toLocaleString()})`;

// --- dataset selector ---
const dsSel = document.getElementById("dataset");
dsSel.innerHTML = Object.entries(D.datasets)
  .map(([id, d]) => `<option value="${id}">${d.meta.label}</option>`).join("");
dsSel.value = activeDS;
function renderDsHint(){
  const m = ds().meta;
  document.getElementById("dshint").textContent =
    `${m.assay} · ${m.timeref}. Designs are normalized independently — absolute heights are not comparable across datasets; the rhythm and phase are.`;
}
dsSel.addEventListener("change", () => {
  activeDS = dsSel.value;
  clearSim(); matches = []; sug.style.display = "none";
  renderMeta(); renderDsHint(); renderChips(); draw();
});

const q = document.getElementById("q");
const sug = document.getElementById("suggest");
const chipsEl = document.getElementById("chips");

let selected = [];      // ordered list of WBGene IDs on the plot
let pending = new Set(); // ticked-but-not-yet-added genes (accumulates across searches)
let colorOf = {};       // wbgene -> color (stable even after removals)
let nextColor = 0;
let matches = [];
let activeIdx = -1;

// --- co-expression similarity (live, per dataset) ---
const simZcache = {};   // dataset id -> { wb: z-scored log2 profile }
let simFor = null;      // gene the "similar" list is built for (null = normal search)
let simMsg = "";        // message shown instead of results (too few timepoints / not expressed)
let simScores = {};     // wb -> Pearson r vs simFor
const MIN_TP_SIM = 6;   // correlation needs enough timepoints to mean anything (embryo's 4 is too few)

function clearSim(){ simFor = null; simMsg = ""; simScores = {}; }

let simMode = "rhythm";  // "rhythm" = detrended (co-cycle) | "trajectory" = raw (whole shape)

function zscore(y){
  const m = y.reduce((a,b)=>a+b,0) / y.length;
  let ss = 0; for(const t of y) ss += (t-m)*(t-m);
  const sd = Math.sqrt(ss / y.length) || 1e-9;
  return y.map(t => (t-m)/sd);
}
// Local-mean detrend over ~one molt period (≈7 h). The window is derived from the
// dataset's own time spacing, so it works on the hourly (Meeuse) and 2-hourly
// (footprint) grids alike. This is the same idea as detect_oscillators.py.
function detrendWindow(){
  const h = ds().hours; let step = 1;
  if(h.length > 1){
    const diffs = []; for(let i=1;i<h.length;i++) diffs.push(h[i]-h[i-1]);
    diffs.sort((a,b)=>a-b); step = diffs[diffs.length>>1] || 1;
  }
  return Math.max(3, Math.round(7/step));
}
function detrendLocal(y){
  const w = detrendWindow(), half = w>>1, n = y.length, out = [];
  for(let i=0;i<n;i++){
    const a = Math.max(0,i-half), b = Math.min(n,i+half+1);
    let s = 0; for(let j=a;j<b;j++) s += y[j];
    out.push(y[i] - s/(b-a));
  }
  return out;
}
function simProfile(v){   // log2 → (optional detrend) → z-score; compares SHAPE not level
  let y = v.map(x => Math.log2(x + 1));
  if(simMode === "rhythm") y = detrendLocal(y);   // strip slow developmental trend, compare the cycle
  return zscore(y);
}
function simZ(){          // {wb: profile} for expressed genes (cached per dataset+mode)
  const key = activeDS + ":" + simMode;
  if(simZcache[key]) return simZcache[key];
  const series = ds().series, Z = {};
  for(const wb in series){
    const v = series[wb].v;
    if(Math.max(...v) >= 16) Z[wb] = simProfile(v);   // same expression floor as the oscillator calls
  }
  return (simZcache[key] = Z);
}
function findSimilar(wb){   // ranked [r, wb] of the most-correlated genes, or null if query not expressed
  const Z = simZ(), zq = Z[wb];
  if(!zq) return null;
  const n = zq.length, out = [];
  for(const o in Z){
    if(o === wb) continue;
    const zo = Z[o]; let s = 0;
    for(let i=0;i<n;i++) s += zq[i]*zo[i];   // Pearson r = mean(z_q · z_o)
    out.push([s/n, o]);
  }
  out.sort((a,b)=> b[0]-a[0]);
  return out.slice(0, 25);
}
function showSimilar(wb){
  clearSim(); matches = []; activeIdx = -1;   // drop any stale search matches before switching modes
  if(ds().hours.length < MIN_TP_SIM){
    simMsg = `Co-expression needs ≥ ${MIN_TP_SIM} timepoints; “${ds().meta.label}” has only ${ds().hours.length}.`;
    renderSuggest(); return;
  }
  const res = findSimilar(wb);
  if(!res){ simMsg = `${D.genes[wb].sym} isn’t expressed in this dataset — nothing to compare.`; renderSuggest(); return; }
  simFor = wb; q.value = ""; activeIdx = -1;
  matches = res.map(([r,o]) => { simScores[o] = r; return { wb:o, sym:D.genes[o].sym }; });
  q.focus(); renderSuggest();
}

function search(term){
  term = term.trim().toLowerCase();
  if(!term) return [];
  const oscOnly = document.getElementById("osconly").checked;
  const tfOnly = document.getElementById("tfonly").checked;
  const starts = [], contains = [];
  for(const e of idx){
    if(oscOnly && !e.o) continue;
    if(tfOnly && !e.t) continue;
    const s = e.sym.toLowerCase(), w = e.wb.toLowerCase();
    if(s.startsWith(term) || w.startsWith(term)) starts.push(e);
    else if(s.includes(term) || w.includes(term)) contains.push(e);
    if(starts.length >= 30) break;
  }
  return starts.concat(contains).slice(0, 30);
}

function renderSuggest(){
  // A short message (too few timepoints / gene not expressed) shows on its own.
  if(simMsg){ sug.innerHTML = `<div class="sughdr">${simMsg}</div>`; sug.style.display="block"; return; }
  // Show the dropdown when there are matches OR when genes are ticked (so the
  // "Add selected" footer stays reachable even after the search box is cleared).
  if(matches.length === 0 && pending.size === 0){ sug.style.display="none"; sug.innerHTML=""; return; }
  let html = "";
  if(simFor){
    const tg = (m,lbl,tip) => `<span class="simtoggle ${simMode===m?'on':''}" data-mode="${m}" title="${tip}">${lbl}</span>`;
    html = `<div class="sughdr">≈ <b>${D.genes[simFor].sym}</b> · ${ds().meta.label} · Pearson r&nbsp; ` +
           tg("rhythm","rhythm","co-cycle: detrended — matches genes that rise and fall together within each cycle") +
           tg("trajectory","trajectory","whole trajectory: matches the overall expression shape across the whole course") +
           `</div>`;
  }
  html += matches.map((e,i) => {
    const g = D.genes[e.wb];
    const already = selected.includes(e.wb);      // already on the plot
    const checked = already || pending.has(e.wb);
    const cls = [i===activeIdx?'active':'', already?'added':''].filter(Boolean).join(' ');
    const tag = already ? `<span class="addedtag">added</span>` : "";
    const oscTag = g.osc ? `<span class="osc">osc${g.phase!=null?` φ${Math.round(g.phase)}°`:""}</span>` : "";
    const tfTag = g.tf ? `<span class="tf">TF</span>` : "";
    // In similar-mode show the correlation; otherwise the biotype.
    const right = simScores[e.wb]!=null
      ? `<span class="simr">r ${simScores[e.wb]>=0?"+":""}${simScores[e.wb].toFixed(2)}</span>`
      : `<span class="bt">${g.bt}</span>`;
    return `<div data-wb="${e.wb}" class="${cls}">` +
           `<input type="checkbox" class="pick" ${checked?'checked':''} ${already?'disabled':''}>` +
           `<span class="sym">${e.sym}</span>${tag}${oscTag}${tfTag}<span class="wb">${e.wb}</span>` +
           right + `</div>`;
  }).join("");
  if(pending.size > 0){
    html += `<div class="sugfoot"><button class="add">Add selected (${pending.size})</button>` +
            `<button class="clearp">clear</button></div>`;
  }
  sug.innerHTML = html;
  sug.style.display = "block";
  // Clicking a row toggles its tick (does not add yet); already-plotted rows are inert.
  // stopPropagation is essential: re-rendering on toggle detaches the clicked node, which
  // would otherwise make the document outside-click handler fire and collapse the list —
  // i.e. the dropdown would "close" after a single tick. Stopping the bubble keeps it open.
  [...sug.querySelectorAll('div[data-wb]')].forEach(c => c.onclick = (ev) => {
    ev.stopPropagation();
    const wb = c.dataset.wb;
    if(!selected.includes(wb)) togglePending(wb);
  });
  const addBtn = sug.querySelector('.sugfoot .add');
  if(addBtn) addBtn.onclick = (ev) => { ev.stopPropagation(); commitPending(); };
  const clearBtn = sug.querySelector('.sugfoot .clearp');
  if(clearBtn) clearBtn.onclick = (ev) => { ev.stopPropagation(); pending.clear(); renderSuggest(); };
  [...sug.querySelectorAll('.simtoggle')].forEach(t => t.onclick = (ev) => {
    ev.stopPropagation();
    if(t.dataset.mode !== simMode){ simMode = t.dataset.mode; showSimilar(simFor); }   // recompute in the other mode
  });
}

function togglePending(wb){
  if(pending.has(wb)) pending.delete(wb); else pending.add(wb);
  const top = sug.scrollTop; renderSuggest(); sug.scrollTop = top;   // keep scroll position while ticking
}

q.addEventListener("input", () => { clearSim(); matches = search(q.value); activeIdx = -1; renderSuggest(); });
["osconly", "tfonly"].forEach(id => document.getElementById(id).addEventListener("change", () => {
  clearSim(); matches = search(q.value); activeIdx = -1; renderSuggest(); q.focus();
}));
q.addEventListener("keydown", (e) => {
  if(sug.style.display==="none") return;
  if(e.key==="ArrowDown"){ activeIdx=Math.min(activeIdx+1,matches.length-1); renderSuggest(); e.preventDefault(); }
  else if(e.key==="ArrowUp"){ activeIdx=Math.max(activeIdx-1,0); renderSuggest(); e.preventDefault(); }
  else if(e.key===" " && activeIdx>=0){          // Space ticks the highlighted row
    const pick = matches[activeIdx];
    if(pick && !selected.includes(pick.wb)) togglePending(pick.wb);
    e.preventDefault();
  }
  else if(e.key==="Enter"){                       // commit ticked genes, else add the active one
    if(pending.size) commitPending();
    else { const pick = matches[activeIdx>=0?activeIdx:0]; if(pick) addGene(pick.wb); }
    e.preventDefault();
  }
  else if(e.key==="Escape"){ sug.style.display="none"; }
});
document.addEventListener("click", (e) => {
  if(sug.contains(e.target) || e.target===q) return;
  if(pending.size){ matches = []; renderSuggest(); }   // collapse to just the "Add selected" footer
  else { sug.style.display="none"; }
});

function addGeneRaw(wb){          // mutate state only; no DOM/redraw (for batched adds)
  if(!selected.includes(wb)){
    selected.push(wb);
    if(!colorOf[wb]){ colorOf[wb] = palette[nextColor % palette.length]; nextColor++; }
  }
}
function resetSearch(){ pending.clear(); clearSim(); q.value = ""; matches = []; sug.style.display = "none";
                        sug.innerHTML = ""; q.focus(); renderChips(); draw(); }
function addGene(wb){            // single immediate add (Enter / programmatic seed)
  addGeneRaw(wb); resetSearch();
}
function commitPending(){        // add every ticked gene in one go
  if(pending.size === 0) return;
  pending.forEach(addGeneRaw);
  resetSearch();
}
function removeGene(wb){ selected = selected.filter(x => x !== wb); renderChips(); draw(); }

function renderChips(){
  chipsEl.innerHTML = selected.map(wb => {
    const g = D.genes[wb];
    const coord = g.chrom==="?" ? "no coord" : `chr${g.chrom}:${g.start.toLocaleString()}`;
    const oscNote = g.osc ? ` · osc φ${Math.round(g.phase)}° amp ${g.amp}` : "";
    const noData = sv(wb) ? "" : ` · <span style="color:#e06c75">no data in this dataset</span>`;
    return `<span class="chip"><span class="dot" style="background:${colorOf[wb]}"></span>` +
           `<span>${g.sym} <small>${coord}${oscNote}${noData}</small></span>` +
           `<span class="sim-btn" data-wb="${wb}" title="find similarly-expressed genes">≈ similar</span>` +
           `<span class="x" data-wb="${wb}">×</span></span>`;
  }).join("");
  [...chipsEl.querySelectorAll(".x")].forEach(x => x.onclick = () => removeGene(x.dataset.wb));
  [...chipsEl.querySelectorAll(".sim-btn")].forEach(b => b.onclick = (ev) => {
    ev.stopPropagation();        // don't let the outside-click handler immediately re-hide the dropdown
    showSimilar(b.dataset.wb);
  });
}

function currentScale(){ return document.querySelector('input[name=scale]:checked').value; }

function draw(){
  if(selected.length === 0){ Plotly.purge("plot"); return; }
  const scale = currentScale();
  const showRep = document.getElementById("showrep").checked;
  // On a log axis, raw 0 counts are undefined and render as vertical drops to the floor.
  // Use a +1 pseudocount (log10(x+1)) so unexpressed timepoints sit flat at the baseline
  // and the line connects smoothly. Linear mode stays raw. Hover always shows the true count.
  const PSEUDO = ds().meta.pseudo ?? 1;   // per-dataset log floor (set in build_data.py)
  const yfor = (arr) => scale === "log" ? arr.map(v => v + PSEUDO) : arr;
  const hours = ds().hours, repHours = ds().rep_hours || [], units = ds().meta.units;
  const traces = [];
  selected.forEach(wb => {
    const s = sv(wb); if(!s) return;        // gene not measured in this dataset
    const g = D.genes[wb], c = colorOf[wb];
    traces.push({ x:hours, y:yfor(s.v), customdata:s.v, mode:"lines+markers", name:g.sym,
                  line:{color:c,width:2}, marker:{size:5,color:c},
                  hovertemplate:"%{fullData.name}: %{customdata:.1f}<extra></extra>" });
    if(showRep && s.r && s.r.length){
      traces.push({ x:repHours, y:yfor(s.r), mode:"markers", name:g.sym+" (rep)",
                    marker:{size:8,color:c,symbol:"diamond-open",line:{width:1.5}},
                    showlegend:false, hoverinfo:"skip" });
    }
  });
  const title = selected.length===1
      ? `${D.genes[selected[0]].sym} — ${units}`
      : `${units} — ${selected.length} genes`;
  const xpad = 1, xlo = hours[0]-xpad, xhi = hours[hours.length-1]+xpad;
  // Stage designs (embryo) carry explicit tickvals/ticktext (1-/2-/4-/8-cell);
  // hourly designs fall back to a fixed 5 h tick spacing.
  const xmeta = ds().meta;
  const xaxis = { title:xmeta.timeref, type:"linear", range:[xlo,xhi],
                  gridcolor:"#262b38", zeroline:false };
  if(xmeta.tickvals){ xaxis.tickvals = xmeta.tickvals; xaxis.ticktext = xmeta.ticktext || xmeta.tickvals; }
  else { xaxis.dtick = 5; }
  // Y-axis. Log mode frames only the *selected* genes between whole decades (so one
  // very-high gene elsewhere in the dataset can't flatten everything), pins zeros to
  // the bottom decade via the per-dataset pseudocount, and uses clean 1/10/100 ticks.
  let yaxis;
  if(scale === "log"){
    const ys = traces.flatMap(t => t.y).filter(v => v > 0 && isFinite(v));
    yaxis = { title:`${units} (log₁₀)`, type:"log", gridcolor:"#262b38",
              zeroline:false, dtick:1 };
    if(ys.length){
      let lo = Math.floor(Math.log10(Math.min(...ys)));
      let hi = Math.ceil (Math.log10(Math.max(...ys)));
      if(hi <= lo) hi = lo + 1;            // guarantee at least one decade of height
      yaxis.range = [lo, hi];
    }
  } else {
    yaxis = { title:units, type:"linear", gridcolor:"#262b38",
              zeroline:false, rangemode:"tozero" };
  }
  const layout = {
    paper_bgcolor:"#171a23", plot_bgcolor:"#171a23", font:{color:"#e6e9ef"},
    margin:{t:50,r:20,b:50,l:64},
    title:{ text:title, font:{size:15} },
    xaxis,
    yaxis,
    legend:{ orientation:"h", y:1.08, x:1, xanchor:"right" },
    hovermode:"x unified",
  };
  Plotly.react("plot", traces, layout, {responsive:true, displaylogo:false});
}

document.querySelectorAll('input[name=scale]').forEach(r => r.addEventListener("change", draw));
document.getElementById("showrep").addEventListener("change", draw);
document.getElementById("clear").addEventListener("click", () => {
  selected=[]; pending.clear(); renderChips(); renderSuggest(); draw(); });

renderMeta(); renderDsHint();

// default view: a couple of canonical oscillating genes
["lin-42","col-19"].forEach(sym => {
  const e = idx.find(x => x.sym === sym);
  if(e) addGene(e.wb);
});
</script>
